apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox
          command:
            - sh
            - -c
            - |
              until nc -z mysql 3306; do
                echo "waiting for mysql";
                sleep 2;
              done

      containers:
        - name: backend
          image: raf05/binwiseweb-backend:1.0

          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          envFrom:
            - secretRef:
                name: backend-secret